<!DOCTYPE html>
<html>
<head>
  <title>Mini TikTok</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🎵 Mini TikTok</h1>

  <!-- FEED PAGE -->
  <div id="feedPage" class="page">
    <div class="input-area">
      <input id="postInput" placeholder="What's happening?" />
      <button onclick="createPost()">Post</button>
    </div>

    <div id="feed"></div>
  </div>

  <!-- PROFILE PAGE -->
  <div id="profilePage" class="page hidden">
    <h2>👤 Profile</h2>
    <p>Username: demo_user</p>
    <p>Total Posts: <span id="postCount"></span></p>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button onclick="showPage('feed')">🏠 Feed</button>
    <button onclick="showPage('feed')">➕ Post</button>
    <button onclick="showPage('profile')">👤 Profile</button>
  </div>

  <script src="tester.js"></script>
</body>
</html>
